id: page1
title: What Are Tools?
content: |
  ## Tools Give AI Superpowers

  **Tools** are capabilities the AI can reach for, like checking the weather or looking something up online. In technical terms, these are often called **functions**.

  The key word is **choose**. You don't tell it which tool to use. *It decides.* That autonomy is what makes it an **agent**.

  On the next page, the AI now has **one tool**: `get_charlotte_weather`.

  Ask it *"What's the weather in Charlotte right now?"* again. The same question from Lab 1! Watch the **Thinking** section and the **tool cards** that appear in the chat.

  Also try: *"Who won the last Super Bowl?"* Does it use the weather tool for that?

  **On the next page, click the green play button (top right) to load the Agent Playground.**
