title: Agent Playground
content: |
  ## Lab 2: One Tool Enabled

  **Click the green play button (top right) to load the Agent Playground.**

  The AI now has one tool: `get_charlotte_weather`.

  Run these same prompts from Lab 1:

  1. `What's the weather in Charlotte right now?` (same question - now watch what happens!)
  2. `Who is in space right now?` (does it use the weather tool for this?)
  3. `Should I bring an umbrella to Charlotte this week?`

  Watch for the **tool cards** that appear in the chat. Notice which questions trigger the tool and which don't. Try your own weather-related questions.
