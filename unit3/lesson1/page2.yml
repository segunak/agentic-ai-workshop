title: Agent Playground
content: |
  ## Lab 2: One Tool Enabled

  **Click the green play button (top right) to load the Agent Playground.**

  The AI now has one tool: `get_charlotte_weather`.

  Try asking:
  - "What's the weather in Charlotte right now?" (same question as Lab 1!)
  - "Who won the last Super Bowl?" (does it use the weather tool for this?)

  Watch for the blue **tool cards** that appear in the chat. You'll see when the agent decides to call a tool and when it gets results back.
