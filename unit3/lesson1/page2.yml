content: |
  ## Lab 2: One Tool Enabled

  **Click the green play button (top right) to load the Agent Playground.**

  The AI now has one tool: `get_current_date`.

  Try asking:
  - "What is today's date?" (same question as Lab 1!)
  - "Tell me a joke" (does it use the tool for this?)

  Watch the **Agent Reasoning** panel on the right. You'll see when the agent decides to call a tool and what it gets back.
