# yaml-language-server: $schema=https://vscodeedu.com/assets/schema/course-v2.schema.json
id: course1
title: "Agentic AI: From Acronyms to Applications"
duration: 30
level: intermediate
description: Interact with a real AI agent, toggle its tools on and off, and discover what makes Agentic AI different from a regular chatbot.
objectives: Distinguish Generative AI from Agentic AI. Experience autonomous tool-calling firsthand. Decode acronyms like RAG, MCP, and RLHF.
prerequisites: No coding experience required. Just a laptop and a Microsoft account.
cardImageUrl: https://vscodeedu.com/assets/course-cards/card8.png
contacts:
  - displayName: Segun Akinyemi
    pictureUrl: https://avatars.githubusercontent.com/u/16299574?v=4
    homePageUrl: https://segunakinyemi.com
files:
  - path: course1/playground-lab1.html
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width,initial-scale=1"/>
        <title>Agent Playground - Lab 1</title>
        <style>html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f1117;}</style>
      </head>
      <body>
        <iframe src="https://agentic-ai-playground.vercel.app/?tools=none" style="border:none;width:100%;height:100%;position:absolute;top:0;left:0;" allow="clipboard-read;clipboard-write"></iframe>
      </body>
      </html>
