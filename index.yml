      </head>
      <body>
      <div id="app">
      <header>
      <div class="left"><h1 id="tt"></h1><div id="ch"></div></div>
      <button id="nb" type="button">New Chat</button>
      </header>
      <main id="m"><div id="hi" class="hint"></div></main>
      <form id="f">
      <input id="i" type="text" placeholder="Ask me something..." autocomplete="off" disabled/>
      <button id="sb" type="submit" disabled>Send</button>
      </form>
      </div>
      <div id="mo" class="ov h">
      <div class="ml">
      <h2>Workshop Key</h2>
      <p>Enter the key shared at the start of the workshop.</p>
      <input id="ki" type="text" placeholder="Enter key..." autocomplete="off"/>
      <button class="bt" id="kb" type="button">Submit</button>
      <div id="ke" class="er"></div>
      </div>
      </div>
      <script>
      const API='https://agentic-ai-playground.vercel.app/api/chat';
      let TOOLS=['get_charlotte_weather','get_people_in_space','get_recent_earthquakes','get_charlotte_cinnamon_roll_rankings'];
      const TITLE='Lab 3: Full Agent';
      const HINT='All <strong>4 tools</strong> enabled. Run these prompts:<br><br>1. "I\'m visiting Charlotte for a data conference. What should I know?"<br>2. "Who is currently in space and have there been any earthquakes this week?"<br>3. "What\'s the weather, any earthquake news, and where should I get cinnamon rolls?"<br><br>Try toggling tools on/off, then ask again!';
      const TL={get_charlotte_weather:'Get Weather',get_people_in_space:'People in Space',get_recent_earthquakes:'Earthquakes',get_charlotte_cinnamon_roll_rankings:'Cinnamon Rolls'};
      const TC={get_charlotte_weather:'weather',get_people_in_space:'space',get_recent_earthquakes:'quake',get_charlotte_cinnamon_roll_rankings:'cinnamon'};
      const TI={get_charlotte_weather:'\u26C5',get_people_in_space:'\uD83D\uDE80',get_recent_earthquakes:'\uD83C\uDF0D',get_charlotte_cinnamon_roll_rankings:'\uD83E\uDD50'};
      const AT=Object.keys(TL);
      const IS_LAB3=true;
      let hist=[],key='',busy=false,trusted=false;
      const $=x=>document.getElementById(x);
      $('tt').textContent=TITLE;$('hi').innerHTML=HINT;
      
      if(IS_LAB3){
      const wrap=document.createElement('div');wrap.className='toggles';
      AT.forEach(n=>{
      const lbl=document.createElement('label');
      const isOn=TOOLS.includes(n);
      lbl.className='tgl'+(isOn?' on-'+TC[n]:' off');
      const cb=document.createElement('input');cb.type='checkbox';cb.checked=isOn;
      const sw=document.createElement('span');sw.className='sw';
      cb.onchange=()=>{if(cb.checked){if(!TOOLS.includes(n))TOOLS.push(n);lbl.className='tgl on-'+TC[n]}else{TOOLS=TOOLS.filter(t=>t!==n);lbl.className='tgl off'}};
      lbl.appendChild(cb);lbl.appendChild(sw);lbl.appendChild(document.createTextNode(TI[n]+' '+TL[n]));wrap.appendChild(lbl)});
      $('ch').appendChild(wrap);
      }else{
      const wrap=document.createElement('div');wrap.className='pills';
      if(!TOOLS.length){
      AT.forEach(n=>{const p=document.createElement('span');p.className='pill off';p.innerHTML='<span class="ico">'+TI[n]+'</span>'+TL[n];wrap.appendChild(p)});
      }else{
      AT.forEach(n=>{const isOn=TOOLS.includes(n);const p=document.createElement('span');p.className='pill '+(isOn?'on-'+TC[n]:'off');p.innerHTML='<span class="ico">'+TI[n]+'</span>'+TL[n];wrap.appendChild(p)});
      }
      $('ch').appendChild(wrap);
      }
      
      (async()=>{
      try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});if(r.status===403){$('hi').innerHTML='<strong>Workshop is not active.</strong><br>Please check back later.';return}if(r.status!==401){trusted=true;go();return}}catch{}
      const s=localStorage.getItem('agentic-ai-key');if(s){key=s;go();return}
      $('mo').classList.remove('h');$('ki').focus()
      })();
      $('kb').onclick=sk;$('ki').onkeydown=e=>{if(e.key==='Enter')sk()};
      function sk(){const v=$('ki').value.trim();if(!v){$('ke').textContent='Please enter a key.';return}key=v;localStorage.setItem('agentic-ai-key',v);$('mo').classList.add('h');go();$('i').focus()}
      function go(){$('i').disabled=false;$('sb').disabled=false;$('i').focus()}
      $('nb').onclick=()=>{hist=[];$('m').innerHTML='';const h=document.createElement('div');h.className='hint';h.innerHTML=HINT;$('m').appendChild(h)};
      $('f').onsubmit=async e=>{
      e.preventDefault();const txt=$('i').value.trim();if(!txt||busy)return;
      const hi=$('m').querySelector('.hint');if(hi)hi.remove();
      hist.push({role:'user',content:txt});addMsg('u',txt);$('i').value='';setBusy(true);
      const el=addMsg('a','');const bub=el.querySelector('.bub');
      const dots=document.createElement('div');dots.className='typing-dots';dots.innerHTML='<span></span><span></span><span></span>';bub.appendChild(dots);
      let cs=null,rz=null,ft='';
      try{
      const hd={'Content-Type':'application/json'};if(!trusted&&key)hd['X-Workshop-Key']=key;
      const r=await fetch(API,{method:'POST',headers:hd,body:JSON.stringify({messages:hist,enabledTools:TOOLS})});
      if(!r.ok){const er=await r.json().catch(()=>({error:'Request failed'}));if(r.status===401){key='';localStorage.removeItem('agentic-ai-key');$('mo').classList.remove('h');$('ki').focus();$('ke').textContent='Invalid key. Try again.'}throw new Error(er.error||'Error '+r.status)}
      const rd=r.body.getReader(),dc=new TextDecoder();let buf='';
      while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ps=buf.split('\n\n');buf=ps.pop();
      for(const p of ps){const ln=p.trim();if(!ln.startsWith('data: '))continue;const d=ln.slice(6);if(d==='[DONE]')continue;
      let ev;try{ev=JSON.parse(d)}catch{continue}
      if(dots.parentNode)dots.remove();
      switch(ev.type){
      case'text-delta':if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs._r+=ev.text;ft+=ev.text;cs.innerHTML=md(cs._r);sc();break;
      case'reasoning-delta':if(!rz){rz=document.createElement('details');rz.className='rz';rz.open=true;rz.innerHTML='<summary>\uD83D\uDCA1 Thinking...</summary><div class="rc"></div>';bub.insertBefore(rz,bub.firstChild)}rz.querySelector('.rc').textContent+=ev.text;break;
      case'tool-call':cs=null;{const tc=document.createElement('div');tc.className='tc';tc.id='t'+ev.toolCallId;tc.innerHTML='<div class="tn">'+(TI[ev.toolName]||'\u2699\uFE0F')+' '+(TL[ev.toolName]||ev.toolName)+'</div><div class="ts">Calling...</div>';bub.appendChild(tc)}sc();break;
      case'tool-result':{const te=document.getElementById('t'+ev.toolCallId);if(te){te.classList.add('ok');te.querySelector('.tn').innerHTML='\u2714\uFE0F '+(TL[ev.toolName]||ev.toolName);te.querySelector('.ts').textContent='Done'}}sc();break;
      case'error':ft+='[Error]';if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs.innerHTML+='<span style="color:#f85149">['+esc(ev.error)+']</span>';break}}}
      if(dots.parentNode)dots.remove();
      if(ft)hist.push({role:'assistant',content:ft})
      }catch(err){if(dots.parentNode)dots.remove();bub.innerHTML='<span style="color:#f85149">'+esc(err.message)+'</span>'}setBusy(false)};
      function addMsg(r,t){const d=document.createElement('div');d.className='msg '+r;const l=document.createElement('div');l.className='lbl';const a=document.createElement('div');a.className='av';a.textContent=r==='u'?'Y':'A';const n=document.createElement('span');n.className='ln';n.textContent=r==='u'?'You':'Assistant';l.appendChild(a);l.appendChild(n);const b=document.createElement('div');b.className='bub';if(t)b.innerHTML=md(t);d.appendChild(l);d.appendChild(b);$('m').appendChild(d);sc();return d}
      function setBusy(v){busy=v;$('i').disabled=v;$('sb').disabled=v;if(!v)$('i').focus()}
      function sc(){const el=$('m');if(el.scrollHeight-el.scrollTop-el.clientHeight<120)el.scrollTop=el.scrollHeight}
      function md(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:#30363d;padding:1px 4px;border-radius:3px">$1</code>').replace(/\n/g,'<br>')}
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </script>
      </body>
      </html>
units:
  - unit1/index.yml
  - unit2/index.yml
  - unit3/index.yml
  - unit4/index.yml
  - unit5/index.yml
