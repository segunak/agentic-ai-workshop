      /* Typing indicator */
      .typing-dots{display:inline-flex;gap:3px;padding:4px 0;vertical-align:middle}
      .typing-dots span{width:5px;height:5px;background:#8957e5;border-radius:50%;animation:bounce .6s infinite}
      .typing-dots span:nth-child(2){animation-delay:.15s}
      .typing-dots span:nth-child(3){animation-delay:.3s}
      @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
      
      /* Lab 3 toggle checkboxes */
      .toggles{display:flex;gap:6px;flex-wrap:wrap}
