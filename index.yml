      .ml input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .2s}
      .ml input:focus{border-color:#8957e5}
      .ml .bt{width:100%;background:#8957e5;color:#fff;border:none;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
      .ml .bt:hover{background:#a371f7}
