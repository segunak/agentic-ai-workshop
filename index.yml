        <div id="km" class="modal"><div class="modal-box"><h2>🔐 Workshop Key</h2><p>Enter the key from your workshop facilitator.</p><input type="text" id="ki" placeholder="Enter workshop key..." autocomplete="off" onkeydown="if(event.key==='Enter')sk()" /><button onclick="sk()">Enter Playground</button><p id="ke" class="err-text"></p></div></div>
