      .tgl.on-weather .sw::after{transform:translateX(12px);background:#58a6ff}
      .tgl.on-space{color:#bc8cff;border:1px solid rgba(163,113,247,.4);background:rgba(163,113,247,.12)}
      .tgl.on-space .sw{background:rgba(163,113,247,.5)}
