      .left h1{font-size:15px;font-weight:600;margin-bottom:3px}
      .chips{display:flex;gap:4px;flex-wrap:wrap}
      .chip{font-size:11px;padding:2px 8px;border-radius:10px;background:#30363d;color:#8b949e}
      .chip.on{background:#1f3a5f;color:#58a6ff}
      #nb{font-size:11px;padding:4px 10px;border-radius:6px;background:#30363d;color:#8b949e;border:1px solid #444c56;cursor:pointer}
      #nb:hover{background:#444c56;color:#e6edf3}
      #m{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
      .hint{text-align:center;color:#8b949e;font-size:13px;padding:20px;line-height:1.7}
      .msg{max-width:88%}.msg.u{align-self:flex-end}.msg.a{align-self:flex-start;width:88%}
      .lbl{font-size:11px;color:#8b949e;margin-bottom:2px;padding:0 4px}
      .bub{padding:10px 14px;border-radius:12px;line-height:1.6;word-wrap:break-word}
      .msg.u .bub{background:#1f6feb;color:#fff}
      .msg.a .bub{background:#161b22;border:1px solid #30363d}
      .tc{background:#1a1e2e;border-left:3px solid #3b82f6;padding:6px 10px;margin:6px 0;border-radius:0 6px 6px 0;font-size:12px}
      .tc .tn{font-weight:600;color:#58a6ff}.tc .ts{color:#8b949e;font-size:11px}
      .tc.ok{border-left-color:#3fb950}.tc.ok .tn{color:#3fb950}
      .rz{font-size:12px;color:#8b949e;font-style:italic;margin-bottom:4px}
      .rz summary{cursor:pointer;user-select:none}
      .rz .rc{padding:4px 0;white-space:pre-wrap;max-height:100px;overflow-y:auto}
      #f{padding:10px 16px;border-top:1px solid #30363d;display:flex;gap:8px;background:#0d1117}
      #f input{flex:1;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
      #f input:focus{border-color:#58a6ff}
      #f input:disabled{opacity:.5}
      #f button{background:#238636;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
      #f button:hover{background:#2ea043}
      #f button:disabled{opacity:.5;cursor:not-allowed}
      .ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
      .ov.h{display:none}
      .ml{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:360px;width:90%}
      .ml h2{font-size:18px;margin-bottom:6px}
      .ml p{color:#8b949e;font-size:13px;margin-bottom:14px}
      .ml input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:10px;border-radius:8px;font-size:14px;margin-bottom:10px;outline:none}
      .ml input:focus{border-color:#58a6ff}
      .ml .bt{width:100%;background:#238636;color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
      .ml .bt:hover{background:#2ea043}
      .er{color:#f85149;font-size:12px;margin-top:6px;min-height:16px}
      .typing::after{content:"";display:inline-block;width:6px;height:14px;background:#58a6ff;margin-left:2px;vertical-align:text-bottom;animation:bk .7s step-end infinite}
      @keyframes bk{50%{opacity:0}}
      </style>
      </head>
      <body>
      <div id="app">
      <header><div class="left"><h1 id="tt"></h1><div id="ch" class="chips"></div></div><button id="nb" type="button">New Chat</button></header>
      <main id="m"><div id="hi" class="hint"></div></main>
      <form id="f"><input id="i" type="text" placeholder="Type a message..." autocomplete="off" disabled/><button id="sb" type="submit" disabled>Send</button></form>
      </div>
      <div id="mo" class="ov h"><div class="ml"><h2>Workshop Key</h2><p>Enter the key from your workshop facilitator.</p><input id="ki" type="text" placeholder="Enter key..." autocomplete="off"/><button class="bt" id="kb" type="button">Submit</button><div id="ke" class="er"></div></div></div>
      <script>
      const API='https://agentic-ai-playground.vercel.app/api/chat';
      const TOOLS=['get_current_date','get_charlotte_weather','get_random_fact','get_charlotte_cinnamon_roll_rankings'];
      const TITLE='Lab 3: Full Agent';
      const HINT='The agent has <strong>all 4 tools</strong>. Try:<br><br>\u2022 "I\'m visiting Charlotte for a data conference. Any tips?"<br>\u2022 "What\'s the weather and where should I get cinnamon rolls?"<br>\u2022 "Tell me something interesting"<br><br>Watch it orchestrate multiple tools in one response!';
      const TL={get_current_date:'Get Date',get_charlotte_weather:'Get Weather',get_random_fact:'Random Fact',get_charlotte_cinnamon_roll_rankings:'Cinnamon Rolls'};
      const AT=Object.keys(TL);
      let hist=[],key='',busy=false,trusted=false;
      const $=x=>document.getElementById(x);
      $('tt').textContent=TITLE;$('hi').innerHTML=HINT;
      AT.forEach(n=>{const c=document.createElement('span');c.className='chip'+(TOOLS.includes(n)?' on':'');c.textContent=TL[n];$('ch').appendChild(c)});
      if(!TOOLS.length){const c=document.createElement('span');c.className='chip';c.textContent='No tools';$('ch').appendChild(c)}
      (async()=>{
      try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});if(r.status===403){$('hi').innerHTML='<strong>Workshop is not active.</strong><br>Please wait for your facilitator.';return}if(r.status!==401){trusted=true;go();return}}catch{}
      const s=localStorage.getItem('agentic-ai-key');if(s){key=s;go();return}
      $('mo').classList.remove('h');$('ki').focus()
      })();
      $('kb').onclick=sk;$('ki').onkeydown=e=>{if(e.key==='Enter')sk()};
      function sk(){const v=$('ki').value.trim();if(!v){$('ke').textContent='Please enter a key.';return}key=v;localStorage.setItem('agentic-ai-key',v);$('mo').classList.add('h');go();$('i').focus()}
      function go(){$('i').disabled=false;$('sb').disabled=false;$('i').focus()}
      $('nb').onclick=()=>{hist=[];$('m').innerHTML='';const h=document.createElement('div');h.className='hint';h.innerHTML=HINT;$('m').appendChild(h)};
      $('f').onsubmit=async e=>{
      e.preventDefault();const txt=$('i').value.trim();if(!txt||busy)return;
      const hi=$('m').querySelector('.hint');if(hi)hi.remove();
      hist.push({role:'user',content:txt});addMsg('u',txt);$('i').value='';setBusy(true);
      const el=addMsg('a','');const bub=el.querySelector('.bub');let cs=null,rz=null,ft='';
      try{
      const hd={'Content-Type':'application/json'};if(!trusted&&key)hd['X-Workshop-Key']=key;
      const r=await fetch(API,{method:'POST',headers:hd,body:JSON.stringify({messages:hist,enabledTools:TOOLS})});
      if(!r.ok){const er=await r.json().catch(()=>({error:'Request failed'}));if(r.status===401){key='';localStorage.removeItem('agentic-ai-key');$('mo').classList.remove('h');$('ki').focus();$('ke').textContent='Invalid key. Try again.'}throw new Error(er.error||'Error '+r.status)}
      const rd=r.body.getReader(),dc=new TextDecoder();let buf='';bub.classList.add('typing');
      while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ps=buf.split('\n\n');buf=ps.pop();
      for(const p of ps){const ln=p.trim();if(!ln.startsWith('data: '))continue;const d=ln.slice(6);if(d==='[DONE]')continue;
      let ev;try{ev=JSON.parse(d)}catch{continue}
      switch(ev.type){
      case'text-delta':if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs._r+=ev.text;ft+=ev.text;cs.innerHTML=md(cs._r);sc();break;
      case'reasoning-delta':if(!rz){rz=document.createElement('details');rz.className='rz';rz.innerHTML='<summary>Thinking...</summary><div class="rc"></div>';bub.insertBefore(rz,bub.firstChild)}rz.querySelector('.rc').textContent+=ev.text;break;
      case'tool-call':cs=null;{const tc=document.createElement('div');tc.className='tc';tc.id='t'+ev.toolCallId;tc.innerHTML='<div class="tn">'+(TL[ev.toolName]||ev.toolName)+' ...</div><div class="ts">Calling</div>';bub.appendChild(tc)}sc();break;
      case'tool-result':{const te=document.getElementById('t'+ev.toolCallId);if(te){te.classList.add('ok');te.querySelector('.tn').textContent=(TL[ev.toolName]||ev.toolName)+' \u2713';te.querySelector('.ts').textContent='Done'}}sc();break;
      case'error':ft+='[Error]';if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs.innerHTML+='<span style="color:#f85149">['+esc(ev.error)+']</span>';break}}}
      bub.classList.remove('typing');if(ft)hist.push({role:'assistant',content:ft})
      }catch(err){bub.classList.remove('typing');bub.innerHTML='<span style="color:#f85149">'+esc(err.message)+'</span>'}setBusy(false)};
      function addMsg(r,t){const d=document.createElement('div');d.className='msg '+r;const l=document.createElement('div');l.className='lbl';l.textContent=r==='u'?'You':'Assistant';const b=document.createElement('div');b.className='bub';if(t)b.innerHTML=md(t);d.appendChild(l);d.appendChild(b);$('m').appendChild(d);sc();return d}
      function setBusy(v){busy=v;$('i').disabled=v;$('sb').disabled=v;if(!v)$('i').focus()}
      function sc(){const el=$('m');if(el.scrollHeight-el.scrollTop-el.clientHeight<100)el.scrollTop=el.scrollHeight}
      function md(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:#30363d;padding:1px 4px;border-radius:3px">$1</code>').replace(/\n/g,'<br>')}
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </script>
      </body>
      </html>
units:
  - unit1/index.yml
  - unit2/index.yml
  - unit3/index.yml
  - unit4/index.yml
  - unit5/index.yml
