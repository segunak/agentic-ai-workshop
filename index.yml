      .rz .rc{padding:4px 0;white-space:pre-wrap;max-height:120px;overflow-y:auto;font-size:11.5px;line-height:1.5;color:#7d8590}
      
      /* Input area */
      #f{padding:10px 14px;border-top:1px solid #21262d;display:flex;gap:8px;background:#0d1117}
      #f input{flex:1;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:20px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
      #f input:focus{border-color:#8957e5;box-shadow:0 0 0 2px rgba(137,87,229,.25)}
