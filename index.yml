# yaml-language-server: $schema=https://vscodeedu.com/assets/schema/course-v2.schema.json
id: course1
title: "Agentic AI: From Acronyms to Applications"
duration: 30
level: intermediate
description: Interact with a real AI agent, toggle its tools on and off, and discover what makes Agentic AI different from a regular chatbot.
objectives: Distinguish Generative AI from Agentic AI. Experience autonomous tool-calling firsthand. Decode acronyms like RAG, MCP, and RLHF.
prerequisites: No coding experience required. Just a laptop and a Microsoft account.
cardImageUrl: https://vscodeedu.com/assets/course-cards/card8.png
contacts:
  - displayName: Segun Akinyemi
    pictureUrl: https://avatars.githubusercontent.com/u/16299574?v=4
    homePageUrl: https://segunakinyemi.com
files:
  - path: course1/playground-lab1.html
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8"/>
      <meta name="viewport" content="width=device-width,initial-scale=1"/>
      <title>Agent Playground - Lab 1: No Tools</title>
      <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{height:100%;overflow:hidden}
      body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
      #app{display:flex;flex-direction:column;height:100vh}
      
      /* Header */
      header{padding:10px 14px 8px;border-bottom:1px solid #21262d;background:#0d1117;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
      .left{min-width:0;flex:1}
      .left h1{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
      .pills{display:flex;gap:6px;flex-wrap:wrap}
      .pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:14px;display:inline-flex;align-items:center;gap:5px;user-select:none;letter-spacing:.2px}
      .pill .ico{font-size:12px}
      .pill.off{background:rgba(110,118,129,.15);color:#484f58;border:1px solid #30363d}
      .pill.on-weather{background:rgba(56,139,253,.2);color:#58a6ff;border:1px solid rgba(56,139,253,.4)}
      .pill.on-space{background:rgba(163,113,247,.2);color:#bc8cff;border:1px solid rgba(163,113,247,.4)}
      .pill.on-quake{background:rgba(240,136,62,.2);color:#f0883e;border:1px solid rgba(240,136,62,.4)}
      .pill.on-cinnamon{background:rgba(219,171,93,.2);color:#e3b341;border:1px solid rgba(219,171,93,.4)}
      .pill.no-tools{background:rgba(110,118,129,.1);color:#6e7681;border:1px dashed #30363d;font-style:italic;font-weight:400}
      #nb{font-size:11px;padding:6px 16px;border-radius:18px;background:transparent;color:#e6edf3;border:1.5px solid #8957e5;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:600;margin-top:2px}
      #nb:hover{background:#8957e5;color:#fff}
      
      /* Messages area */
      #m{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
      .hint{text-align:center;color:#7d8590;font-size:13px;padding:24px 16px;line-height:1.8}
      .hint strong{color:#fff}
      
      /* Messages */
      .msg{max-width:85%;animation:fadeIn .25s ease}
      .msg.u{align-self:flex-end}
      .msg.a{align-self:flex-start;width:85%}
      @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
      
      /* Avatar labels */
      .lbl{display:flex;align-items:center;gap:5px;margin-bottom:3px;padding:0 2px}
      .av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
      .msg.u .av{background:linear-gradient(135deg,#1f6feb,#388bfd);color:#fff}
      .msg.a .av{background:linear-gradient(135deg,#8957e5,#a371f7);color:#fff}
      .ln{font-size:10px;color:#7d8590;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
      
      /* Bubbles */
      .bub{padding:10px 14px;border-radius:14px;line-height:1.65;word-wrap:break-word;font-size:13.5px}
      .msg.u .bub{background:linear-gradient(135deg,#1f6feb,#388bfd);color:#fff;border-bottom-right-radius:4px}
      .msg.a .bub{background:#161b22;border:1px solid #21262d;border-bottom-left-radius:4px}
      
      /* Tool call cards */
      .tc{background:rgba(137,87,229,.08);border-left:3px solid #8957e5;padding:7px 10px;margin:8px 0;border-radius:0 8px 8px 0;font-size:12px;transition:all .4s ease;animation:fadeIn .3s ease}
      .tc .tn{font-weight:600;color:#a371f7;display:flex;align-items:center;gap:4px}
      .tc .ts{color:#7d8590;font-size:11px;margin-top:1px}
      .tc.ok{border-left-color:#a371f7;background:rgba(137,87,229,.12)}
      .tc.ok .tn{color:#d2a8ff}
      
      /* Reasoning accordion */
      .rz{font-size:12px;color:#7d8590;margin-bottom:6px;background:rgba(139,148,158,.06);border-radius:8px;padding:6px 10px;border:1px solid #21262d}
      .rz summary{cursor:pointer;user-select:none;font-weight:500;color:#8b949e;display:flex;align-items:center;gap:4px}
      .rz[open] summary{margin-bottom:4px}
      .rz .rc{padding:4px 0;white-space:pre-wrap;max-height:120px;overflow-y:auto;font-size:11.5px;line-height:1.5;color:#7d8590}
      
      /* Input area */
      #f{padding:10px 14px;border-top:1px solid #21262d;display:flex;gap:8px;background:#0d1117}
      #f input{flex:1;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:20px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
      #f input:focus{border-color:#8957e5;box-shadow:0 0 0 2px rgba(137,87,229,.25)}
      #f input:disabled{opacity:.4}
      #f button{background:#8957e5;color:#fff;border:none;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
      #f button:hover{background:#a371f7}
      #f button:disabled{opacity:.4;cursor:not-allowed}
      
      /* Workshop key modal */
      .ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
      .ov.h{display:none}
      .ml{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px;max-width:340px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.4)}
      .ml h2{font-size:17px;margin-bottom:6px;color:#e6edf3}
      .ml p{color:#7d8590;font-size:13px;margin-bottom:16px;line-height:1.5}
      .ml input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .2s}
      .ml input:focus{border-color:#8957e5}
      .ml .bt{width:100%;background:#8957e5;color:#fff;border:none;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
      .ml .bt:hover{background:#a371f7}
      .er{color:#f85149;font-size:12px;margin-top:6px;min-height:16px}
      
      /* Typing indicator */
      .typing-dots{display:inline-flex;gap:3px;padding:4px 0;vertical-align:middle}
      .typing-dots span{width:5px;height:5px;background:#8957e5;border-radius:50%;animation:bounce .6s infinite}
      .typing-dots span:nth-child(2){animation-delay:.15s}
      .typing-dots span:nth-child(3){animation-delay:.3s}
      @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
      
      /* Lab 3 toggle checkboxes */
      .toggles{display:flex;gap:6px;flex-wrap:wrap}
      .tgl{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;padding:4px 10px;border-radius:14px;transition:all .2s;letter-spacing:.2px}
      .tgl input{display:none}
      .tgl .sw{width:28px;height:16px;border-radius:8px;background:#30363d;position:relative;transition:background .2s;flex-shrink:0}
      .tgl .sw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#484f58;transition:all .2s}
      .tgl.on-weather{color:#58a6ff;border:1px solid rgba(56,139,253,.4);background:rgba(56,139,253,.12)}
      .tgl.on-weather .sw{background:rgba(56,139,253,.5)}
      .tgl.on-weather .sw::after{transform:translateX(12px);background:#58a6ff}
      .tgl.on-space{color:#bc8cff;border:1px solid rgba(163,113,247,.4);background:rgba(163,113,247,.12)}
      .tgl.on-space .sw{background:rgba(163,113,247,.5)}
      .tgl.on-space .sw::after{transform:translateX(12px);background:#bc8cff}
      .tgl.on-quake{color:#f0883e;border:1px solid rgba(240,136,62,.4);background:rgba(240,136,62,.12)}
      .tgl.on-quake .sw{background:rgba(240,136,62,.5)}
      .tgl.on-quake .sw::after{transform:translateX(12px);background:#f0883e}
      .tgl.on-cinnamon{color:#e3b341;border:1px solid rgba(219,171,93,.4);background:rgba(219,171,93,.12)}
      .tgl.on-cinnamon .sw{background:rgba(219,171,93,.5)}
      .tgl.on-cinnamon .sw::after{transform:translateX(12px);background:#e3b341}
      .tgl.off{color:#484f58;border:1px solid #30363d;background:transparent}
      .tgl.off .sw{background:#30363d}
      .tgl.off .sw::after{background:#484f58;transform:translateX(0)}
      .tgl:hover{filter:brightness(1.15)}
      </style>
      </head>
      <body>
      <div id="app">
      <header>
      <div class="left"><h1 id="tt"></h1><div id="ch"></div></div>
      <button id="nb" type="button">New Chat</button>
      </header>
      <main id="m"><div id="hi" class="hint"></div></main>
      <form id="f">
      <input id="i" type="text" placeholder="Ask me something..." autocomplete="off" disabled/>
      <button id="sb" type="submit" disabled>Send</button>
      </form>
      </div>
      <div id="mo" class="ov h">
      <div class="ml">
      <h2>Workshop Key</h2>
      <p>Enter the key shared at the start of the workshop.</p>
      <input id="ki" type="text" placeholder="Enter key..." autocomplete="off"/>
      <button class="bt" id="kb" type="button">Submit</button>
      <div id="ke" class="er"></div>
      </div>
      </div>
      <script>
      const API='https://agentic-ai-playground.vercel.app/api/chat';
      let TOOLS=[];
      const TITLE='Lab 1: No Tools';
      const HINT='This agent has <strong>no tools</strong>. Run these prompts in order:<br><br>1. "What\'s the weather in Charlotte right now?"<br>2. "Who is in space right now?"<br>3. "Have there been any major earthquakes this week?"<br>4. "Who won the last Super Bowl?"<br>5. "What are Segun Akinyemi\'s top cinnamon roll spots in Charlotte?"<br><br>Then try your own. Ask anything requiring real-time info.';
      const TL={get_charlotte_weather:'Get Weather',get_people_in_space:'People in Space',get_recent_earthquakes:'Earthquakes',get_charlotte_cinnamon_roll_rankings:'Cinnamon Rolls'};
      const TC={get_charlotte_weather:'weather',get_people_in_space:'space',get_recent_earthquakes:'quake',get_charlotte_cinnamon_roll_rankings:'cinnamon'};
      const TI={get_charlotte_weather:'\u26C5',get_people_in_space:'\uD83D\uDE80',get_recent_earthquakes:'\uD83C\uDF0D',get_charlotte_cinnamon_roll_rankings:'\uD83E\uDD50'};
      const AT=Object.keys(TL);
      const IS_LAB3=false;
      let hist=[],key='',busy=false,trusted=false;
      const $=x=>document.getElementById(x);
      $('tt').textContent=TITLE;$('hi').innerHTML=HINT;
      
      if(IS_LAB3){
      const wrap=document.createElement('div');wrap.className='toggles';
      AT.forEach(n=>{
      const lbl=document.createElement('label');
      const isOn=TOOLS.includes(n);
      lbl.className='tgl'+(isOn?' on-'+TC[n]:' off');
      const cb=document.createElement('input');cb.type='checkbox';cb.checked=isOn;
      const sw=document.createElement('span');sw.className='sw';
      cb.onchange=()=>{if(cb.checked){if(!TOOLS.includes(n))TOOLS.push(n);lbl.className='tgl on-'+TC[n]}else{TOOLS=TOOLS.filter(t=>t!==n);lbl.className='tgl off'}};
      lbl.appendChild(cb);lbl.appendChild(sw);lbl.appendChild(document.createTextNode(TI[n]+' '+TL[n]));wrap.appendChild(lbl)});
      $('ch').appendChild(wrap);
      }else{
      const wrap=document.createElement('div');wrap.className='pills';
      if(!TOOLS.length){
      AT.forEach(n=>{const p=document.createElement('span');p.className='pill off';p.innerHTML='<span class="ico">'+TI[n]+'</span>'+TL[n];wrap.appendChild(p)});
      }else{
      AT.forEach(n=>{const isOn=TOOLS.includes(n);const p=document.createElement('span');p.className='pill '+(isOn?'on-'+TC[n]:'off');p.innerHTML='<span class="ico">'+TI[n]+'</span>'+TL[n];wrap.appendChild(p)});
      }
      $('ch').appendChild(wrap);
      }
      
      (async()=>{
      try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});if(r.status===403){$('hi').innerHTML='<strong>Workshop is not active.</strong><br>Please check back later.';return}if(r.status!==401){trusted=true;go();return}}catch{}
      const s=localStorage.getItem('agentic-ai-key');if(s){key=s;go();return}
      $('mo').classList.remove('h');$('ki').focus()
      })();
      $('kb').onclick=sk;$('ki').onkeydown=e=>{if(e.key==='Enter')sk()};
      function sk(){const v=$('ki').value.trim();if(!v){$('ke').textContent='Please enter a key.';return}key=v;localStorage.setItem('agentic-ai-key',v);$('mo').classList.add('h');go();$('i').focus()}
      function go(){$('i').disabled=false;$('sb').disabled=false;$('i').focus()}
      $('nb').onclick=()=>{hist=[];$('m').innerHTML='';const h=document.createElement('div');h.className='hint';h.innerHTML=HINT;$('m').appendChild(h)};
      $('f').onsubmit=async e=>{
      e.preventDefault();const txt=$('i').value.trim();if(!txt||busy)return;
      const hi=$('m').querySelector('.hint');if(hi)hi.remove();
      hist.push({role:'user',content:txt});addMsg('u',txt);$('i').value='';setBusy(true);
      const el=addMsg('a','');const bub=el.querySelector('.bub');
      const dots=document.createElement('div');dots.className='typing-dots';dots.innerHTML='<span></span><span></span><span></span>';bub.appendChild(dots);
      let cs=null,rz=null,ft='';
      try{
      const hd={'Content-Type':'application/json'};if(!trusted&&key)hd['X-Workshop-Key']=key;
      const r=await fetch(API,{method:'POST',headers:hd,body:JSON.stringify({messages:hist,enabledTools:TOOLS})});
      if(!r.ok){const er=await r.json().catch(()=>({error:'Request failed'}));if(r.status===401){key='';localStorage.removeItem('agentic-ai-key');$('mo').classList.remove('h');$('ki').focus();$('ke').textContent='Invalid key. Try again.'}throw new Error(er.error||'Error '+r.status)}
      const rd=r.body.getReader(),dc=new TextDecoder();let buf='';
      while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});const ps=buf.split('\n\n');buf=ps.pop();
      for(const p of ps){const ln=p.trim();if(!ln.startsWith('data: '))continue;const d=ln.slice(6);if(d==='[DONE]')continue;
      let ev;try{ev=JSON.parse(d)}catch{continue}
      if(dots.parentNode)dots.remove();
      switch(ev.type){
      case'text-delta':if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs._r+=ev.text;ft+=ev.text;cs.innerHTML=md(cs._r);sc();break;
      case'reasoning-delta':if(!rz){rz=document.createElement('details');rz.className='rz';rz.open=true;rz.innerHTML='<summary>\uD83D\uDCA1 Thinking...</summary><div class="rc"></div>';bub.insertBefore(rz,bub.firstChild)}rz.querySelector('.rc').textContent+=ev.text;break;
      case'tool-call':cs=null;{const tc=document.createElement('div');tc.className='tc';tc.id='t'+ev.toolCallId;tc.innerHTML='<div class="tn">'+(TI[ev.toolName]||'\u2699\uFE0F')+' '+(TL[ev.toolName]||ev.toolName)+'</div><div class="ts">Calling...</div>';bub.appendChild(tc)}sc();break;
      case'tool-result':{const te=document.getElementById('t'+ev.toolCallId);if(te){te.classList.add('ok');te.querySelector('.tn').innerHTML='\u2714\uFE0F '+(TL[ev.toolName]||ev.toolName);te.querySelector('.ts').textContent='Done'}}sc();break;
      case'error':ft+='[Error]';if(!cs){cs=document.createElement('span');cs._r='';bub.appendChild(cs)}cs.innerHTML+='<span style="color:#f85149">['+esc(ev.error)+']</span>';break}}}
      if(dots.parentNode)dots.remove();
      if(ft)hist.push({role:'assistant',content:ft})
      }catch(err){if(dots.parentNode)dots.remove();bub.innerHTML='<span style="color:#f85149">'+esc(err.message)+'</span>'}setBusy(false)};
      function addMsg(r,t){const d=document.createElement('div');d.className='msg '+r;const l=document.createElement('div');l.className='lbl';const a=document.createElement('div');a.className='av';a.textContent=r==='u'?'Y':'A';const n=document.createElement('span');n.className='ln';n.textContent=r==='u'?'You':'Assistant';l.appendChild(a);l.appendChild(n);const b=document.createElement('div');b.className='bub';if(t)b.innerHTML=md(t);d.appendChild(l);d.appendChild(b);$('m').appendChild(d);sc();return d}
      function setBusy(v){busy=v;$('i').disabled=v;$('sb').disabled=v;if(!v)$('i').focus()}
      function sc(){const el=$('m');if(el.scrollHeight-el.scrollTop-el.clientHeight<120)el.scrollTop=el.scrollHeight}
      function md(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="background:#30363d;padding:1px 4px;border-radius:3px">$1</code>').replace(/\n/g,'<br>')}
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </script>
      </body>
      </html>
  - path: course1/playground-lab2.html
    content: |
