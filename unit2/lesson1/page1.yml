content: >
  ## Lab 1: The Chatbot (No Tools)


  On the next page, you'll open the **Agent Playground**  - a chat interface
  connected to an AI model.


  Right now, the AI has **no tools**. It can only answer from what it memorized
  during training.


  👉 **Try asking it:** *"What is today's date?"*


  Pay attention to what it says. Is the answer correct?


  ⚠️ You'll need the **workshop key** displayed on the projector screen.


  **On the next page, click the green play button (top right) to load the Agent Playground.**
