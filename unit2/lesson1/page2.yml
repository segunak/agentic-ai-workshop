title: Agent Playground
content: |
  ## Lab 1: No Tools

  **Click the green play button (top right) to load the Agent Playground.**

  This AI has **no tools**. It can only respond from its training data.

  Try asking:
  - "What's the weather in Charlotte right now?"
  - "Who won the last Super Bowl?"
  - "What country led the medal count at the 2026 Winter Olympics?"

  Pay attention to its answers. Can it give you real, current information?
