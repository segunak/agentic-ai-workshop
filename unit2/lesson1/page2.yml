id: page2
title: Agent Playground
content: |
  ## Lab 1: No Tools

  **Click the green play button (top right) to load the Agent Playground.**

  This AI has **no tools**. It can only respond from its training data.

  Try asking:
  - "What is today's date?"
  - "Tell me a joke"
  - "What's the weather in Charlotte?"

  Pay attention to its answers. Are they accurate? How does it handle questions about real-time information?
