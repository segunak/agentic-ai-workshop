id: page1
title: What Makes an Agent Yours?
dependsOn:
  - unit4:lesson1:page3
content: |
  ## From User to Builder

  So far you've used an agent someone else configured. Now you configure one yourself.

  Creating custom agents is standard practice across the industry. [GitHub](https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/create-custom-agents), [Anthropic](https://code.claude.com/docs/en/sub-agents), and [OpenAI](https://developers.openai.com/tracks/building-agents/) all provide ways to create custom agents with specific instructions and tool access.

  Remember OpenAI's definition:

  > An AI system that has **instructions** (what it should do), **guardrails** (what it should not do), and access to **tools** (what it can do) to take action on the user's behalf.

  On the next page you will:

  1. **Write instructions** that define your agent's personality
  2. **Choose tools** that give it capabilities
  3. **Test it** and see how it behaves

  **On the next page, click the green play button (top right) to open Lab 4.**
