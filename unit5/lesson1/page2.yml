id: page2
title: Build Your Own Agent
content: |
  ## Build Your Own Agent

  **Click the green play button (top right) to open Lab 4.**

  Pick a recipe to start with (or start from scratch), customize the instructions, choose your tools, and test it.

  Some ideas to try:

  1. Pick the **Breaking News Anchor** recipe and ask about earthquakes
  2. Change the personality to something completely different and ask the same question
  3. Toggle tools on and off to see how your agent adapts

  Have fun with it.
