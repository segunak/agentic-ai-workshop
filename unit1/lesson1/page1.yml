# yaml-language-server: $schema=https://vscodeedu.com/assets/schema/course-v2.schema.json
id: page1
title: "What is Agentic AI?"
content: |
  ## Welcome to the Agent Playground

  In this workshop, you'll interact with a real AI agent and discover what makes it different from a regular chatbot.

  **Generative AI** creates new content from patterns it learned during training. It only knows what was in that training data and has no way to look anything up or take actions. Reactive: prompt and stop.

  **Agentic AI** uses tools in a loop to achieve a goal. It plans, reasons, and decides which tools to call without you telling it. Proactive: plan and act.

  These aren't different products. They're different behaviors. The same AI model can do both. Generative is the response. Agentic is the work it does to get there.

  > "An LLM agent runs tools in a loop to achieve a goal."
  >
  > [Simon Willison](https://simonwillison.net/tags/agent-definitions/)

  > "We've gravitated towards a simple definition for agents: LLMs autonomously using tools in a loop."
  >
  > [Anthropic](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents)

  **Tools** are capabilities the AI can reach for, like checking the weather or looking something up online. In technical terms, these are often called **functions**. **Loop** means it can use them multiple times, feeding results back in. **Goal** means there's a stopping condition.

  You may have already seen this in action. Products like ChatGPT (OpenAI), Claude (Anthropic, Gemini (Google), and GitHub Copilot show you the model's "reasoning" as it works. When you see it thinking, searching, or calling tools before responding, that's agentic behavior.

  You're about to see this in action.
questionGroups:
  - questions:
      - id: "1"
        type: choice
        content: "You paste a paragraph into a chatbot and ask it to rewrite it in a more professional tone. It rewrites it and stops. What kind of AI behavior is this?"
        options:
          - id: a
            value: "Generative AI"
            isCorrect: true
            explanation: "It responded to a prompt and stopped. No tools, no planning, no autonomy. That's Generative AI."
          - id: b
            value: "Agentic AI"
            isCorrect: false
            incorrectExplanation: "Agentic AI would use tools to get the job done. This system just generated text and stopped."
          - id: c
            value: "Neither"
            isCorrect: false
            incorrectExplanation: "It is AI. It's generating content. It's just not agentic."
      - id: "2"
        type: choice
        content: "A system monitors your meetings, creates action items without being asked, and schedules follow-ups on its own. What kind of AI is this?"
        options:
          - id: a
            value: "Generative AI"
            isCorrect: false
            incorrectExplanation: "Generative AI only responds when prompted. This system acts without being asked."
          - id: b
            value: "Agentic AI"
            isCorrect: true
            explanation: "It acts on its own without being asked, plans next steps, and takes actions. That's Agentic AI."
          - id: c
            value: "Neither"
            isCorrect: false
            incorrectExplanation: "It uses AI to understand language and take actions. Definitely AI."
      - id: "3"
        type: choice
        content: "A script runs every night at 2 AM, copies data to backup storage, sends a notification, same steps every time. What is this?"
        options:
          - id: a
            value: "Generative AI"
            isCorrect: false
            incorrectExplanation: "It's not generating any content. Just following preset rules."
          - id: b
            value: "Agentic AI"
            isCorrect: false
            incorrectExplanation: "There's no decision-making or reasoning. It runs the same steps every time."
          - id: c
            value: "Neither - traditional automation"
            isCorrect: true
            explanation: "No AI involved. Just a scheduled script following preset rules. Not everything needs AI!"
