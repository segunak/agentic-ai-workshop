# yaml-language-server: $schema=https://vscodeedu.com/assets/schema/course-v2.schema.json
id: page1
title: What is Agentic AI?
content: |
  ## Welcome to the Agent Playground

  In this workshop, you'll interact with AI firsthand and see the difference between Generative AI and Agentic AI for yourself.

  **Generative AI** creates new content from patterns it learned during training. When it's just responding from that training data without using any tools (more on what tools are below), that's generative behavior. Reactive: prompt and stop.

  **Agentic AI** uses tools in a loop to achieve a goal. It plans, reasons, and decides which tools to call without you telling it. Proactive: plan and act.

  These aren't different products. They're different behaviors. The same AI model can do both. Generative is the response. Agentic is the work it does to get there.

  > "An LLM agent runs tools in a loop to achieve a goal."
  >
  > [Simon Willison](https://simonwillison.net/2025/Sep/18/agents/)

  > "We've gravitated towards a simple definition for agents: LLMs autonomously using tools in a loop."
  >
  > [Anthropic](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents)

  > "An AI system that has instructions (what it should do), guardrails (what it should not do), and access to tools (what it can do) to take action on the user's behalf."
  >
  > [OpenAI](https://developers.openai.com/tracks/building-agents/)

  **Tools** are capabilities the AI can reach for, like checking the weather or looking something up online. In technical terms, these are often called **functions**. **Loop** means it can use them multiple times, feeding results back in. **Goal** means there's a stopping condition.

  You may have already seen this in action. Products like [ChatGPT](https://en.wikipedia.org/wiki/ChatGPT) ([OpenAI](https://en.wikipedia.org/wiki/OpenAI)), [Claude](https://en.wikipedia.org/wiki/Claude_(language_model)) ([Anthropic](https://en.wikipedia.org/wiki/Anthropic)), [Gemini](https://en.wikipedia.org/wiki/Gemini_(language_model)) ([Google](https://en.wikipedia.org/wiki/Google)), and [GitHub Copilot](https://en.wikipedia.org/wiki/GitHub_Copilot) ([Microsoft](https://en.wikipedia.org/wiki/Microsoft)) show you the model's "reasoning" as it works. When you see it thinking, searching, or calling tools before responding, that's agentic behavior.

  You're about to see this for yourself.
questionGroups:
  - id: "1"
    content: Based on what you just read, classify these scenarios.
    questions:
      - id: "1"
        type: choice
        content: You paste a paragraph into a chatbot and ask it to rewrite it in a more
          professional tone. It rewrites it and stops. What kind of AI behavior
          is this?
        options:
          - id: a
            value: Generative AI
            explanation: It responded to a prompt and stopped. No tools, no planning, no
              autonomy. That's Generative AI.
            isCorrect: true
          - id: b
            value: Agentic AI
            incorrectExplanation: Agentic AI would use tools to get the job done. This
              system just generated text and stopped.
          - id: c
            value: Neither
            incorrectExplanation: It is AI. It's generating content. It's just not agentic.
  - id: "2"
    questions:
      - id: "1"
        type: choice
        content: A system monitors your meetings, creates action items without being
          asked, and schedules follow-ups on its own. What kind of AI behavior
          is this?
        hint: Think about whether someone prompted it or it acted on its own.
        options:
          - id: a
            value: Generative AI
            incorrectExplanation: Generative AI only responds when prompted. This system
              acts without being asked.
          - id: b
            value: Agentic AI
            explanation: It acts on its own without being asked, plans next steps, and takes
              actions. That's Agentic AI.
            isCorrect: true
          - id: c
            value: Neither
            incorrectExplanation: It uses AI to understand language and take actions. Definitely AI.
  - id: "3"
    questions:
      - id: "1"
        type: choice
        content: A script runs every night at 2 AM, copies data to backup storage, sends
          a notification, same steps every time. What is this?
        hint: Is there any AI involved at all?
        options:
          - id: a
            value: Generative AI
            incorrectExplanation: It's not generating any content. Just following preset rules.
          - id: b
            value: Agentic AI
            incorrectExplanation: There's no decision-making or reasoning. It runs the same
              steps every time.
          - id: c
            value: Neither - traditional automation
            explanation: No AI involved. Just a scheduled script following preset rules. Not
              everything needs AI!
            isCorrect: true
